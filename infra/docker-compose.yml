# ASOptimus — self-hosting stack: server (brain + billing) + Postgres.
# BUILD-PLAN §7/§9: hosting is docker-compose, on Colima or any Docker host.
#
# Quick start (run from THIS directory so ./.env is picked up):
#   cp .env.example .env      # then fill in the secrets
#   docker compose up --build -d
#   curl localhost:8787/health
#
# Config: ./.env  (see ./.env.example).  Runbook: ./README.md.
# The `server` image is built from ../server (the asoptimus-server submodule,
# which provides its own Dockerfile — Bun base, EXPOSE 8787).

name: asoptimus

services:
  # ── Postgres: source of truth (wallet/ledger/runs/apple_cache …). ───────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-asoptimus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-asoptimus}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Bound to localhost only, for psql/inspection. Comment out to keep it
    # fully internal to the compose network (recommended on a shared host).
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── One-shot migrations: applies server/src/db/schema.sql, then exits 0. ─────
  #   Reuses the server image (no second build). Server waits for it to succeed.
  #   Reads only DATABASE_URL (see server/src/db/migrate.ts).
  migrate:
    image: asoptimus-server:local
    restart: "no"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-asoptimus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-asoptimus}}
    command: ["bun", "run", "migrate"]
    depends_on:
      postgres:
        condition: service_healthy

  # ── Server: Bun.serve on :PORT (HTTP REST + SSE + WSS /ws). ──────────────────
  server:
    build:
      context: ..
      dockerfile: server/Dockerfile
    image: asoptimus-server:local
    restart: unless-stopped
    env_file: .env
    # DATABASE_URL is derived from POSTGRES_* → the `postgres` service by default,
    # so there is no value to keep in sync. Set DATABASE_URL in .env only to point
    # at an external/managed Postgres (then it wins via the substitution below).
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-asoptimus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-asoptimus}}
    ports:
      # Loopback-only: locally the desktop app connects to 127.0.0.1 anyway, and on a prod
      # host the public entry is Caddy (:443) — the plain-HTTP port must not face the world.
      - "127.0.0.1:${PORT:-8787}:${PORT:-8787}"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      # Bun is guaranteed present in the image; avoids assuming curl/wget.
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:'+(process.env.PORT||8787)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Caddy: public TLS entry (prod only: `docker compose --profile prod up`). ─
  #   Auto-issues Let's Encrypt for ${API_DOMAIN}; proxies WSS/SSE transparently.
  #   Local runs skip it (no profile) — the app talks to 127.0.0.1:8787 directly.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["prod"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      API_DOMAIN: ${API_DOMAIN:-api.asoptimus.com}
    depends_on:
      server:
        condition: service_healthy

volumes:
  pgdata:
  caddy_data:
  caddy_config:
