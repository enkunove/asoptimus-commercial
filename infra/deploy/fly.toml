# Fly.io config for the ASOptimus server (long-lived process: WSS + SSE).
# Copy into the `server/` submodule repo (Fly expects fly.toml at the build
# context root, next to server/Dockerfile) and edit `app` + `primary_region`.
#   fly launch --no-deploy --copy-config --dockerfile Dockerfile
#   fly postgres create && fly postgres attach     # injects DATABASE_URL
#   fly secrets set ANTHROPIC_API_KEY=… PADDLE_API_KEY=… …  (see infra/README.md)
#   fly deploy

app = "asoptimus-server"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8787"
  REQUIRE_CLIENT = "1"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = false      # keep alive: WSS/SSE clients hold long connections
  auto_start_machines = true
  min_machines_running = 1

  [http_service.http_options.response]
    pristine = true               # don't buffer SSE

  [[http_service.checks]]
    method = "get"
    path = "/health"
    interval = "15s"
    timeout = "5s"
    grace_period = "15s"

# Secrets (NOT here — set via `fly secrets set`): ANTHROPIC_API_KEY, PADDLE_API_KEY,
# PADDLE_WEBHOOK_SECRET, TOPUP_PACKAGES_JSON, SMTP_HOST/PORT/USER/PASS/FROM, JWT_SECRET, HMAC_SECRET,
# MODEL_PRICES_JSON. DATABASE_URL is injected by `fly postgres attach`.
